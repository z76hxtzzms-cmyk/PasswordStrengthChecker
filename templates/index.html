<!doctype html>
<html>
  <head>
    <title>Password Strength Checker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <span class="eyebrow">// security tool</span>
      <h1>Password Strength</h1>
      <p class="subtitle">Analyze how secure your password really is</p>

      <div class="card">
        <form action="/results" method="POST">
          <div class="field">
            <label>Password</label>
            <!-- Password input, name is crucial for Flask to identify it -->
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit">Check Strength</button>

          <div class="divider"></div>
          <a href="/generate_password" class="generate-btn">Generate Strong Password</a>
        </form>
      </div>
    </div>
  </body>
</html>
